name: Garmin Sync

# 2026-07-20 起每日排程停用：Garmin 已對 GitHub 機房 IP 的 OAuth 換發端點
# 持續回 429（連每天一次都擋，非用量問題），排程改由使用者 Mac 上的 launchd
# 執行（scripts/local_sync.sh，每日 07:30）。保留手動觸發以備 Garmin 解除封鎖
# 後測試用；若確認解封可還原 cron：'0 22 * * *'（= 台北 06:00）。
on:
  workflow_dispatch:
    inputs:
      force_monthly_goal:
        description: "無視「月底」限制，強制生成當月的 AI 訓練目標（補跑/測試用）"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 版本鎖定 0.2.8：需與產生 GARMINTOKENS 的版本相容（0.3.x 改用不相容的
      # di_token 格式）。若升級，token 需用新版重新產生。
      - run: pip install "garminconnect==0.2.8" requests

      # 快取 Garmin OAuth session：避免每次執行都重新打 OAuth2 換發端點
      # （該端點對頻繁請求很敏感，過去每次都用過期的 GARMINTOKENS 重新換發，
      # 密集手動測試時很容易在短時間內連續命中同一端點觸發限流）。
      # key 帶 run_id 讓每次執行都能存新版本，restore-keys 撈最近一次的快取。
      - uses: actions/cache@v4
        with:
          path: ~/.garminconnect
          key: garmin-session-${{ github.run_id }}
          restore-keys: garmin-session-

      - run: python scripts/sync_garmin.py
        env:
          GARMINTOKENS: ${{ secrets.GARMINTOKENS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_MONTHLY_GOAL: ${{ github.event.inputs.force_monthly_goal == 'true' && '1' || '' }}
