name: Garmin Sync

on:
  schedule:
    # 每天 22:00 UTC = 台北 06:00
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 版本鎖定：garminconnect 改版時 API 會變（0.3 就改過），避免排程突然壞掉
      - run: pip install "garminconnect==0.3.6" requests

      # CI 只用 GARMINTOKENS 登入：Garmin 對雲端 IP 的帳密登入一律回 429。
      # token 由本機執行 scripts/garmin_login.py 產生，效期約一年。
      - run: python scripts/sync_garmin.py
        env:
          GARMINTOKENS: ${{ secrets.GARMINTOKENS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
