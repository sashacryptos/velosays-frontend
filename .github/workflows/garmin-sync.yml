name: Garmin Sync

on:
  schedule:
    # 每天 22:00 UTC = 台北 06:00
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      force_monthly_goal:
        description: "無視「月底」限制，強制生成當月的 AI 訓練目標（補跑/測試用）"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 版本鎖定 0.2.8：需與產生 GARMINTOKENS 的版本相容（0.3.x 改用不相容的
      # di_token 格式）。若升級，token 需用新版重新產生。
      - run: pip install "garminconnect==0.2.8" requests

      # CI 只用 GARMINTOKENS 登入：Garmin 對雲端 IP 的帳密登入一律回 429。
      # token 由本機執行 scripts/garmin_login.py 產生，效期約一年。
      - run: python scripts/sync_garmin.py
        env:
          GARMINTOKENS: ${{ secrets.GARMINTOKENS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_MONTHLY_GOAL: ${{ github.event.inputs.force_monthly_goal == 'true' && '1' || '' }}
